[package]
  cjc-version = "1.0.0"
  version = "0.1.0"
  name = "jinguissl_contract"
  output-type = "static"
  src-dir = "src/jinguissl_contract"
  compile-option = "-Woff unused"
  description = "Stable Cangjie facade for cryptography, X.509, TLS, and SSH startup contracts"
  include = ["src"]

[dependencies]
  [dependencies.jinguissl_core]
    path = "../JinguiSSL-core"
